author: "LordHookie"
delete-after: True
changes:
  - rscadd: "Holy Handcuffs have been added, forcing holy antimagic onto their wearer. They can be crafted with silver, a bible, and some handcuffs."
  - rscadd: "Cursekin now have a smaller transformation by default. A larger transformation is available as a quirk!"
  - balance: "Cursekin's Lycan form is now less resilient, but is faster and can wear clothing."
  - balance: "Cursekin can no longer transform if under holy antimagic."
  - balance: "Cursekin's transformation now has an action timer. It will go on cooldown if interrupted."
  - balance: "Cursekin are now baned by silver. This bane intensifies while they are transformed."