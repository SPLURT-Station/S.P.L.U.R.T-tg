version: "3.9"

services:
  db:
    image: postgres:15-alpine
    container_name: slith_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-slith_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-slith_pass}
      POSTGRES_DB: ${POSTGRES_DB:-slith_db}
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER:-slith_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: slith_backend
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      DATABASE_URL: postgres://${POSTGRES_USER:-slith_user}:${POSTGRES_PASSWORD:-slith_pass}@db:5432/${POSTGRES_DB:-slith_db}
      PORT: ${BACKEND_PORT:-5000}
    ports:
      - "${BACKEND_PORT:-5000}:5000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: ["npm", "run", "dev"]

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: slith_frontend
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      REACT_APP_API_URL: http://localhost:${BACKEND_PORT:-5000}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      backend:
        condition: service_started
    volumes:
      - ./frontend:/app
    command: ["npm", "start"]

volumes:
  db_data:

networks:
  default:
    driver: bridge